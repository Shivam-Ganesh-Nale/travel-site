<!DOCTYPE html>
<html>
    <head>
        <script src="https://kit.fontawesome.com/d81996f93b.js" crossorigin="anonymous"></script>
        <title>Login to SB Yatra company</title>
        <link rel="stylesheet" href="assets/css/sblogin.css">
    </head>
    <body>
        <header>
            <span class="icon1"><i class="fa fa-globe" aria-hidden="true"></i></span>
            <h2 class="logo">SB Yatra</h2>
            <nav class="navigation">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Service</a>
                <a href="#">Contact</a>
                <button class="btnLogic-popup">login</button>
            </nav>

        </header>
        <div class="wrapper">
            <div class="form-box login">
                <h2>Login</h2>
                <form action="#">
                    <div class="input-box">
                        <span class="icon"><ion-icon name="mail"></ion-icon></span>
                        <input type="email" name="email" id="email" placeholder="Enter Your Email">
                    </div>
                    <div class="input-box">
                        <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                        <input type="password" name="password" id="password" placeholder="Enter Your password">
                    </div>
                    <div class="remember-forgot">
                        <label><input type="checkbox">Remember me</label>
                        <a href="#">Forgot Password?</a>
                    </div>
                    <button type="submit"class="btn">Sign In</button>
                    <div class="login-register">
                        <p>Don't have an account? <a href="#" class="register-link">Register</a></p>
                    </div>
                </form>
            </div>
        </div>
       
        <script src="https://kit.fontawesome.com/d81996f93b.js" crossorigin="anonymous"></script>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </body>
    </html>
